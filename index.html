<title>VAGModHaus · Data Review</title>
<link rel="preconnect" href="https://fonts.googleapis.com">

<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Barlow',sans-serif;background:#0e0e0e;color:#f0f0f0;min-height:100vh;overflow-x:hidden}
:root{--vw:#1a3aff;--audi:#CC0A22;--ok:#1D9E75;--ok-bg:#0a2e21;--ok-light:#1a4a35;--fix:#E09020;--fix-bg:#2e1e00;--fix-light:#3a2800;--add:#3a8fdd;--add-bg:#0a1e30;--add-light:#102840;--card:#1a1a1a;--card2:#222;--border:#333;--text:#f0f0f0;--muted:#888}

/* HERO */
.hero{position:relative;overflow:hidden;padding:20px 16px 18px}
.hero-bg{position:absolute;inset:0;z-index:0}
.hero-bg-vw{background:linear-gradient(135deg,#000820 0%,#001a6e 50%,#002bb3 100%)}
.hero-bg-audi{background:linear-gradient(135deg,#1a0003 0%,#7a0010 50%,#CC0A22 100%)}
.hero-noise{position:absolute;inset:0;opacity:.04;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.9' numOctaves='4'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E")}
.hero-car-svg{position:absolute;right:-20px;bottom:-10px;z-index:0;opacity:.12;width:200px}
.hero-content{position:relative;z-index:1}
.brand-badge{display:inline-flex;align-items:center;gap:8px;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);border-radius:20px;padding:4px 12px 4px 6px;margin-bottom:12px}
.brand-dot{width:8px;height:8px;border-radius:50%}
.brand-dot-vw{background:#4d7fff}
.brand-dot-audi{background:#ff6680}
.brand-badge-txt{font-size:11px;color:rgba(255,255,255,0.8);letter-spacing:2px;text-transform:uppercase;font-weight:600}
.hero-title{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:36px;color:#fff;letter-spacing:1px;line-height:1;margin-bottom:4px}
.hero-sub{font-size:13px;color:rgba(255,255,255,0.5);letter-spacing:.5px;margin-bottom:16px}
.brand-tabs{display:flex;gap:8px}
.btab{flex:1;padding:10px 0;border-radius:10px;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:18px;letter-spacing:2px;cursor:pointer;border:1.5px solid rgba(255,255,255,0.2);background:rgba(255,255,255,0.08);color:rgba(255,255,255,0.6);transition:all .2s;text-align:center}
.btab.on-vw{background:#fff;color:#001a6e;border-color:#fff}
.btab.on-audi{background:#fff;color:#CC0A22;border-color:#fff}

/* PROGRESS */
.prog-strip{padding:14px 16px;background:#141414;border-bottom:1px solid #222}
.prog-label{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.prog-label-txt{font-size:12px;color:var(--muted);font-weight:500;letter-spacing:.5px}
.prog-pct{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:20px;color:#fff}
.prog-bar{height:6px;background:#2a2a2a;border-radius:3px;overflow:hidden;margin-bottom:10px}
.prog-fill{height:100%;border-radius:3px;transition:width .5s cubic-bezier(.4,0,.2,1)}
.prog-fill-vw{background:linear-gradient(90deg,#1a3aff,#6680ff)}
.prog-fill-audi{background:linear-gradient(90deg,#CC0A22,#ff4460)}
.badges{display:flex;gap:6px;flex-wrap:wrap}
.badge{display:flex;align-items:center;gap:5px;padding:5px 10px;border-radius:8px;font-size:12px;font-weight:600}
.badge-ok{background:var(--ok-bg);color:#5DCAA5;border:1px solid var(--ok-light)}
.badge-fix{background:var(--fix-bg);color:#EF9F27;border:1px solid var(--fix-light)}
.badge-add{background:var(--add-bg);color:#6db8f0;border:1px solid var(--add-light)}
.badge-left{background:#1a1a1a;color:var(--muted);border:1px solid #2a2a2a}

/* MODEL LIST */
.body{padding:12px 16px;max-width:500px;margin:0 auto}
.section-lbl{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:12px;letter-spacing:3px;color:var(--muted);text-transform:uppercase;margin-bottom:10px;margin-top:4px}
.model-grid{display:flex;flex-direction:column;gap:8px;margin-bottom:16px}
.mcard{border-radius:14px;overflow:hidden;cursor:pointer;background:var(--card);border:1px solid var(--border);transition:all .15s;active:scale(.98)}
.mcard:active{transform:scale(.98)}
.mcard-inner{display:flex;align-items:stretch}
.mcard-stripe{width:4px;flex-shrink:0;background:#333}
.mcard-stripe-vw{background:linear-gradient(180deg,#1a3aff,#6680ff)}
.mcard-stripe-audi{background:linear-gradient(180deg,#CC0A22,#ff6680)}
.mcard-stripe-done{background:linear-gradient(180deg,#1D9E75,#5DCAA5)}
.mcard-stripe-partial{background:linear-gradient(180deg,#E09020,#EF9F27)}
.mcard-body{flex:1;padding:12px 14px}
.mcard-row{display:flex;align-items:center;gap:10px}
.mcard-icon{font-size:22px;line-height:1}
.mcard-name{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:19px;letter-spacing:.3px;color:#fff}
.mcard-meta{font-size:12px;color:var(--muted);margin-top:3px}
.mcard-right{display:flex;flex-direction:column;align-items:flex-end;justify-content:center;padding:12px 14px;gap:5px;min-width:56px}
.mini-bar{width:44px;height:4px;background:#2a2a2a;border-radius:2px;overflow:hidden}
.mini-fill{height:100%;border-radius:2px}
.mini-fill-vw{background:#1a3aff}
.mini-fill-audi{background:#CC0A22}
.mini-fill-done{background:#1D9E75}
.mini-fill-partial{background:#E09020}
.mcard-pct{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:15px;color:var(--muted)}
.mcard-pct-done{color:#5DCAA5}

/* DOWNLOAD BTN */
.dl-wrap{padding:0 0 20px}
.dl-btn{width:100%;padding:14px;border-radius:12px;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:17px;letter-spacing:2px;cursor:pointer;border:none;display:flex;align-items:center;justify-content:center;gap:8px;transition:opacity .15s}
.dl-btn:active{opacity:.8}
.dl-btn-vw{background:linear-gradient(135deg,#1a3aff,#6680ff);color:#fff}
.dl-btn-audi{background:linear-gradient(135deg,#CC0A22,#ff4460);color:#fff}
.dl-icon{font-size:18px}

/* MODEL VIEW */
.mv-hero{position:relative;overflow:hidden;padding:16px 16px 14px}
.mv-hero-content{position:relative;z-index:1}
.mv-back-row{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.back-btn{width:38px;height:38px;border-radius:10px;border:1.5px solid rgba(255,255,255,0.25);background:rgba(255,255,255,0.1);color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.back-btn:active{opacity:.7}
.mv-title-row{flex:1}
.mv-model-name{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:28px;color:#fff;letter-spacing:.5px;line-height:1}
.mv-model-sub{font-size:12px;color:rgba(255,255,255,0.5);margin-top:2px}
.mv-prog{height:4px;background:rgba(255,255,255,0.15);border-radius:2px;overflow:hidden;margin-top:12px}
.mv-prog-fill{height:100%;border-radius:2px;background:rgba(255,255,255,0.8);transition:width .4s}

/* ENTRIES */
.entries{padding:12px 16px;display:flex;flex-direction:column;gap:10px;max-width:500px;margin:0 auto}
.ecard{border-radius:14px;overflow:hidden;background:var(--card);border:1px solid var(--border)}
.ecard.e-ok{border-color:#1D9E75}
.ecard.e-edit{border-color:#E09020}
.ecard.e-add{border-color:#3a8fdd}
.ecard-top{display:flex;align-items:flex-start;gap:0;padding:12px 14px 10px}
.ecard-num{width:26px;height:26px;border-radius:7px;background:#2a2a2a;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:13px;color:var(--muted);display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-right:10px;margin-top:1px}
.ecard-num-ok{background:var(--ok-bg);color:#5DCAA5}
.ecard-num-edit{background:var(--fix-bg);color:#EF9F27}
.ecard-num-add{background:var(--add-bg);color:#6db8f0}
.ecard-info{flex:1;min-width:0}
.ecard-chassis{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:17px;color:#fff;letter-spacing:.3px;word-break:break-word}
.ecard-tags{display:flex;flex-wrap:wrap;gap:5px;margin-top:6px}
.etag{padding:3px 9px;border-radius:7px;font-size:11px;font-weight:600}
.etag-sub{background:#2a1e00;color:#EF9F27}
.etag-engine{background:#1a1030;color:#9b8ff0}
.etag-dt{background:#0a1828;color:#6db8f0}
.ecard-sb{padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;white-space:nowrap;flex-shrink:0;margin-left:8px;margin-top:1px}
.sb-pending{background:#1a1a1a;color:var(--muted);border:1px solid #333}
.sb-ok{background:var(--ok-bg);color:#5DCAA5}
.sb-edit{background:var(--fix-bg);color:#EF9F27}
.sb-add{background:var(--add-bg);color:#6db8f0}
.ecard-actions{display:flex;gap:8px;padding:0 14px 12px}
.eact{flex:1;padding:10px 6px;border-radius:10px;font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:700;letter-spacing:.5px;cursor:pointer;text-align:center;border:1.5px solid transparent;transition:all .15s}
.eact:active{transform:scale(.97)}
.eact-ok{background:var(--ok-bg);color:#5DCAA5;border-color:#1D9E75}
.eact-fix{background:var(--fix-bg);color:#EF9F27;border-color:#E09020}

/* EDIT PANEL */
.edit-panel{background:#141414;padding:12px 14px 14px;border-top:1px solid #2a2a2a}
.ep-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}
.ep-field{display:flex;flex-direction:column;gap:4px}
.ep-label{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.8px}
.ep-input{padding:8px 10px;border:1px solid #333;border-radius:9px;background:#1e1e1e;color:#fff;font-size:13px;width:100%;font-family:'Barlow',sans-serif}
.ep-input:focus{outline:none;border-color:#4455ff}
.ep-note{width:100%;padding:8px 10px;border:1px solid #333;border-radius:9px;background:#1e1e1e;color:#fff;font-size:13px;resize:none;height:56px;font-family:'Barlow',sans-serif;margin-bottom:10px}
.ep-note:focus{outline:none;border-color:#4455ff}
.ep-save{width:100%;padding:11px;border-radius:10px;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:16px;letter-spacing:1.5px;cursor:pointer;border:none;color:#fff;transition:opacity .15s}
.ep-save:active{opacity:.8}
.ep-save-vw{background:linear-gradient(135deg,#1a3aff,#5566ff)}
.ep-save-audi{background:linear-gradient(135deg,#CC0A22,#ff3355)}
.add-wrap{padding:0 16px 12px;max-width:500px;margin:0 auto}
.add-btn{width:100%;padding:12px;border-radius:12px;font-size:13px;font-weight:600;cursor:pointer;border:1.5px dashed #333;background:transparent;color:var(--muted);transition:all .15s}
.add-btn:hover{background:#1a1a1a;border-color:#444;color:#aaa}
</style>
</head>

function parse(raw){
  return raw.trim().split('\n').filter(l=>l.trim()).map((line,i)=>{
    const p=line.split(',');
    return{id:i,model:(p[0]||'').trim(),chassis:(p[1]||'').trim(),submodel:(p[2]||'').trim(),engine:(p[3]||'').trim(),drivetrain:(p[4]||'').trim(),status:'pending',fC:'',fS:'',fE:'',fD:'',note:'',isNew:false};
  });
}

const DB={vw:parse(RAW_VW),audi:parse(RAW_AUDI)};
let brand='vw',view='list',selModel=null,openEdit=null;

function byModel(b){const m={};DB[b].forEach(r=>{if(!m[r.model])m[r.model]=[];m[r.model].push(r);});return m;}
function mStat(rows){const t=rows.length,d=rows.filter(r=>r.status!=='pending').length;return{pct:t?Math.round(d/t*100):0,done:d,total:t,isDone:d===t&&t>0,isPartial:d>0&&d<t};}
function totals(b){const r=DB[b];return{total:r.length,ok:r.filter(x=>x.status==='ok').length,fix:r.filter(x=>x.status==='edited').length,add:r.filter(x=>x.status==='added').length,left:r.filter(x=>x.status==='pending').length};}

function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function render(){document.getElementById('app').innerHTML=view==='list'?rList():rModel();}

function rList(){
  const b=brand,isVW=b==='vw',ms=byModel(b),st=totals(b);
  const pct=st.total?Math.round((st.total-st.left)/st.total*100):0;
  let h=`<div class="hero hero-bg-${isVW?'vw':'audi'}">
    <div class="hero-noise"></div>
    <div class="hero-content">
      <div class="brand-badge"><div class="brand-dot brand-dot-${isVW?'vw':'audi'}"></div><span class="brand-badge-txt">Data Review by Max</span></div>
      <div class="hero-title">VAGModHaus</div>
      <div class="hero-sub">${isVW?'Volkswagen':'Audi'} · Проверка базы данных</div>
      <div class="brand-tabs">
        <button class="btab${b==='vw'?' on-vw':''}" onclick="setBrand('vw')">VW</button>
        <button class="btab${b==='audi'?' on-audi':''}" onclick="setBrand('audi')">AUDI</button>
      </div>
    </div>
  </div>
  <div class="prog-strip">
    <div class="prog-label"><span class="prog-label-txt">Общий прогресс</span><span class="prog-pct">${pct}%</span></div>
    <div class="prog-bar"><div class="prog-fill prog-fill-${isVW?'vw':'audi'}" style="width:${pct}%"></div></div>
    <div class="badges">
      <span class="badge badge-ok">✓ ${st.ok}</span>
      <span class="badge badge-fix">✎ ${st.fix}</span>
      <span class="badge badge-add">+ ${st.add}</span>
      <span class="badge badge-left">${st.left} осталось</span>
    </div>
  </div>
  <div class="body">
    <div class="section-lbl">Модели</div>
    <div class="model-grid">`;
  Object.keys(ms).forEach(m=>{
    const s=mStat(ms[m]),ico=ICONS[m]||'🚗';
    const sc=s.isDone?'done':s.isPartial?'partial':(isVW?'vw':'audi');
    const fc=s.isDone?'mini-fill-done':s.isPartial?'mini-fill-partial':(isVW?'mini-fill-vw':'mini-fill-audi');
    h+=`<div class="mcard" onclick="openModel('${esc(m)}')">
      <div class="mcard-inner">
        <div class="mcard-stripe mcard-stripe-${sc}"></div>
        <div class="mcard-body">
          <div class="mcard-row"><span class="mcard-icon">${ico}</span><span class="mcard-name">${esc(m)}</span></div>
          <div class="mcard-meta">${ms[m].length} записей · ${s.done}/${s.total} проверено</div>
        </div>
        <div class="mcard-right">
          <div class="mini-bar"><div class="mini-fill ${fc}" style="width:${s.pct}%"></div></div>
          <div class="mcard-pct${s.isDone?' mcard-pct-done':''}">${s.pct}%</div>
        </div>
      </div>
    </div>`;
  });
  h+=`</div></div>
  <div style="padding:0 16px 24px;max-width:500px;margin:0 auto">
    <button class="dl-btn dl-btn-${isVW?'vw':'audi'}" onclick="dlCSV()">⬇ СКАЧАТЬ РЕЗУЛЬТАТЫ CSV</button>
  </div>`;
  return h;
}

function rModel(){
  const b=brand,isVW=b==='vw';
  const rows=DB[b].filter(r=>r.model===selModel);
  const s=mStat(rows),ico=ICONS[selModel]||'🚗';
  let h=`<div class="mv-hero hero-bg-${isVW?'vw':'audi'}">
    <div class="hero-noise"></div>
    <div class="mv-hero-content">
      <div class="mv-back-row">
        <button class="back-btn" onclick="goList()">←</button>
        <div class="mv-title-row">
          <div class="mv-model-name">${ico} ${esc(selModel)}</div>
          <div class="mv-model-sub">${s.done}/${s.total} проверено · ${s.pct}%</div>
        </div>
      </div>
      <div class="mv-prog"><div class="mv-prog-fill" style="width:${s.pct}%"></div></div>
    </div>
  </div>
  <div class="entries">`;
  rows.forEach((r,i)=>{
    const isOpen=openEdit===r.id;
    const chassis=r.isNew?(r.fC||'Новая запись'):r.chassis;
    const sub=r.isNew?r.fS:r.submodel,eng=r.isNew?r.fE:r.engine,dt=r.isNew?r.fD:r.drivetrain;
    const nc=r.status==='ok'?'ecard-num-ok':r.status==='edited'?'ecard-num-edit':r.status==='added'?'ecard-num-add':'';
    const cc=r.status==='ok'?'e-ok':r.status==='edited'?'e-edit':r.status==='added'?'e-add':'';
    const sc=r.status==='ok'?'sb-ok':r.status==='edited'?'sb-edit':r.status==='added'?'sb-add':'sb-pending';
    const sl=r.status==='ok'?'✓ Верно':r.status==='edited'?'✎ Правка':r.status==='added'?'+ Новое':'?';
    h+=`<div class="ecard ${cc}" id="ec_${r.id}">
      <div class="ecard-top">
        <div class="ecard-num ${nc}">${i+1}</div>
        <div class="ecard-info">
          <div class="ecard-chassis">${esc(chassis)||'(без chassis)'}</div>
          <div class="ecard-tags">
            ${sub?`<span class="etag etag-sub">${esc(sub)}</span>`:''}
            ${eng?`<span class="etag etag-engine">${esc(eng)}</span>`:''}
            ${dt?`<span class="etag etag-dt">${esc(dt)}</span>`:''}
          </div>
        </div>
        <span class="ecard-sb ${sc}">${sl}</span>
      </div>`;
    if(!isOpen){
      h+=`<div class="ecard-actions">
        <button class="eact eact-ok" onclick="markOk(${r.id})">✓ ВЕРНО</button>
        <button class="eact eact-fix" onclick="openFix(${r.id})">✎ ИСПРАВИТЬ</button>
      </div>`;
    } else {
      h+=`<div class="edit-panel">
        <div class="ep-grid">
          <div class="ep-field"><div class="ep-label">Chassis</div><input class="ep-input" id="fc_${r.id}" value="${esc(r.fC||r.chassis)}"></div>
          <div class="ep-field"><div class="ep-label">Submodel</div><input class="ep-input" id="fs_${r.id}" value="${esc(r.fS||r.submodel)}"></div>
        </div>
        <div class="ep-grid">
          <div class="ep-field"><div class="ep-label">Engine</div><input class="ep-input" id="fe_${r.id}" value="${esc(r.fE||r.engine)}"></div>
          <div class="ep-field"><div class="ep-label">Drivetrain</div><input class="ep-input" id="fd_${r.id}" value="${esc(r.fD||r.drivetrain)}"></div>
        </div>
        <div class="ep-label" style="margin-bottom:5px;margin-top:2px">Заметка</div>
        <textarea class="ep-note" id="fn_${r.id}" placeholder="что неверно, что добавить...">${esc(r.note||'')}</textarea>
        <button class="ep-save ep-save-${isVW?'vw':'audi'}" onclick="saveFix(${r.id})">СОХРАНИТЬ</button>
      </div>`;
    }
    h+=`</div>`;
  });
  h+=`</div><div class="add-wrap"><button class="add-btn" onclick="addEntry()">+ Добавить пропущенную запись</button></div>`;
  return h;
}

function setBrand(b){brand=b;view='list';selModel=null;openEdit=null;render();}
function goList(){view='list';openEdit=null;render();}
function openModel(m){selModel=m;view='model';openEdit=null;render();}
function markOk(id){const r=DB[brand].find(x=>x.id===id);if(r){r.status='ok';openEdit=null;}render();}
function openFix(id){openEdit=(openEdit===id)?null:id;render();}

function saveFix(id){
  const r=DB[brand].find(x=>x.id===id);if(!r)return;
  r.fC=document.getElementById('fc_'+id)?.value||'';
  r.fS=document.getElementById('fs_'+id)?.value||'';
  r.fE=document.getElementById('fe_'+id)?.value||'';
  r.fD=document.getElementById('fd_'+id)?.value||'';
  r.note=document.getElementById('fn_'+id)?.value||'';
  const ch=(r.fC&&r.fC!==r.chassis)||(r.fS!==r.submodel)||(r.fE!==r.engine)||(r.fD!==r.drivetrain);
  r.status=r.isNew?'added':(ch?'edited':'ok');
  openEdit=null;render();
}

function addEntry(){
  const nid=Date.now();
  DB[brand].push({id:nid,model:selModel,chassis:'',submodel:'',engine:'',drivetrain:'',status:'added',fC:'',fS:'',fE:'',fD:'',note:'',isNew:true});
  openEdit=nid;render();
}

function dlCSV(){
  const b=brand,rows=DB[b];
  const h='Бренд,Модель,Chassis (оригинал),Submodel (оригинал),Engine (оригинал),Drivetrain (оригинал),Chassis (Макс),Submodel (Макс),Engine (Макс),Drivetrain (Макс),Статус,Заметка\n';
  const lines=rows.map(r=>[b.toUpperCase(),`"${r.model}"`,`"${r.chassis}"`,`"${r.submodel}"`,`"${r.engine}"`,`"${r.drivetrain}"`,`"${r.fC||r.chassis}"`,`"${r.fS||r.submodel}"`,`"${r.fE||r.engine}"`,`"${r.fD||r.drivetrain}"`,r.status,`"${(r.note||'').replace(/"/g,'""')}"`].join(',')).join('\n');
  const blob=new Blob(['\uFEFF'+h+lines],{type:'text/csv;charset=utf-8;'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=`vagmodhaus_${b}_max_review.csv`;a.click();
}

render();
</script>
